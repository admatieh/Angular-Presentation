<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angular Talk</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reset.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css" id="theme" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/monokai.css" />

  <style>
    :root {
      --r-main-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --r-heading-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --r-heading-text-transform: none;
      --r-link-color: #dd0031;
      --r-link-color-hover: #ff4d6d;
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal h1,
    .reveal h2,
    .reveal h3 {
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .reveal .muted {
      color: #b4b4b4;
    }

    .reveal .accent {
      color: #dd0031;
    }

    .reveal .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: center;
    }

    .reveal .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.04);
    }

    .reveal ul li,
    .reveal ol li {
      margin: 0.35em 0;
    }

    .reveal code {
      border-radius: 10px;
      padding: 0.1em 0.25em;
    }

    .reveal pre code {
      max-height: 520px;
      border-radius: 18px;
      padding: 20px;
    }

    .footer-note {
      position: fixed;
      bottom: 16px;
      right: 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      z-index: 20;
    }

    @media (max-width: 900px) {
      .reveal .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">
      <section data-markdown="slides.md" data-separator="^---$" data-separator-vertical="^--$"
        data-separator-notes="^Note:"></section>
    </div>
  </div>

  <div class="footer-note">Angular Talk Starter</div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      controls: true,
      progress: true,
      center: true,
      transition: 'slide',
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });
  </script>
</body>

</html>
